# Manifest add-onu HA OS.
# Repo z jednym add-onem: korzeń = katalog add-onu (kontekst buildu).
name: Rozpoznawanie twarzy
version: "0.1.0"
slug: face_recognition
description: >-
  Rozpoznawanie twarzy domowników z kamery IP. Nieznana twarz lub osoba bez
  twarzy w zaznaczonym fragmencie kadru → alert ze zdjęciem do Home Assistant
  przez MQTT.
url: https://github.com/mprasal/homeassistant-face-recognition
# RPi 5 = aarch64; amd64 dla dev/testów na PC.
arch:
  - aarch64
  - amd64
startup: application
boot: auto
# Brak s6-overlay w obrazie bazowym (python:slim) — własny CMD.
init: false
# UI w panelu bocznym HA przez Ingress (bez osobnego logowania).
ingress: true
ingress_port: 8099
panel_icon: mdi:face-recognition
panel_title: Twarze
# Trwały katalog danych (SQLite, snapshoty, modele).
map:
  - data:rw
# Supervisor poda dane brokera MQTT (wykorzystamy w Fazie 4).
services:
  - mqtt:want
# Globalne pokrętła. Kamery (źródło, ROI, interwał, cooldown) konfiguruje się
# w UI add-onu i trzyma w SQLite — nie tutaj. run.sh mapuje te opcje na env
# FACE_* (patrz run.sh).
options:
  log_level: info
  go2rtc_url: "http://localhost:1984"
  snapshot_timeout: 5.0
  match_threshold: 0.4
  person_conf: 0.5
  det_thresh: 0.4
schema:
  log_level: list(debug|info|warning|error)
  go2rtc_url: str
  snapshot_timeout: float(0.5,)
  match_threshold: float(0,1)
  person_conf: float(0,1)
  det_thresh: float(0,1)
